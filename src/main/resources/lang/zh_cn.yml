  name-profile: "§6§l%player% §7(个人主页)"
  name-comments: "§6§l%player% §7(留言板)"
  bio-empty: "§7未设置签名"
  bio-label: "§7签名: §f"
  likes-label: "§7总点赞数: §e"
  pages-label: "§7已解锁页数: §e"

# 注册日期
register-date:
  name: "§6§l注册日期"
  joined-label: "§7加入时间: §f"

# 留言按钮 (现在用于切换视图)
comments:
  name: "§d§l留言 §7(%count%条)"
  name-switch-comments: "§d§l留言 §7(%count%条) §e[点击切换]"
  name-switch-profile: "§d§l主页 §7(%count%条留言) §e[点击切换]"
  click-hint: "§7点击留言"
