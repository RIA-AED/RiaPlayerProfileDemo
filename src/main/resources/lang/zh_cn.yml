# 留言物品 (在留言视图中显示)
comment-item:
  author-label: "§7来自: §f"
  date-label: "§7时间: §f"
  click-delete: "§c点击删除此留言"

# 空槽位
empty-slot:
  name: " "

# 确认对话框
confirm:
  title: "§e确认操作"
  confirm-button: "§a[§l确认§a]"
  cancel-button: "§c[§l取消§c]"
  timeout: "§7(30秒内有效)"
