# ============================================
# RIA Player Profile - 简体中文本地化
# ============================================

# 消息前缀
prefix: "&8[&bRIA-个人主页&8] &r"

# 通用消息
no-permission: "&c你没有权限执行此操作。"
player-not-found: "&c找不到该玩家。该玩家可能从未登录过服务器。"
invalid-usage: "&c用法错误。正确用法: %usage%"
