# 留言消息
comment-success: "&a留言发布成功！"
comment-too-long: "&c留言太长，最大长度为 %max% 个字符。"
comment-empty: "&c留言不能为空。"
comment-delete-success: "&a留言删除成功！"
comment-delete-no-permission: "&c你只能删除自己主页上的留言。"
comment-not-found: "&c留言不存在。"
comment-delete-confirm: "&e确定要删除留言 #%id% 吗？"

# 物品删除消息
item-delete-confirm: "&e确定要删除这个物品吗？"
